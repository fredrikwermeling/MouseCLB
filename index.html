<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MouseCLB — Mouse Cancer Cell Line Browser</title>
  <style>
    :root {
      --green-700: #15803d;
      --green-800: #166534;
      --gray-50:   #f9fafb;
      --gray-100:  #f3f4f6;
      --gray-200:  #e5e7eb;
      --gray-400:  #9ca3af;
      --gray-500:  #6b7280;
      --gray-700:  #374151;
      --red-700:   #991b1b;
      --indigo-700:#3730a3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--gray-700); background: #fff; font-size: 13px; line-height: 1.5;
    }
    header {
      border-bottom: 1px solid var(--gray-200); padding: 14px 20px;
      display: flex; align-items: baseline; gap: 16px;
    }
    header h1 { margin: 0; font-size: 18px; color: var(--green-800); }
    header .tag {
      font-size: 10px; padding: 2px 8px; background: var(--gray-100);
      border-radius: 10px; color: var(--gray-500); border: 1px solid var(--gray-200);
    }
    main { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 56px); }
    #list-pane {
      border-right: 1px solid var(--gray-200); overflow-y: auto;
      max-height: calc(100vh - 56px);
    }
    #list-pane .search {
      position: sticky; top: 0; background: #fff; padding: 10px 12px;
      border-bottom: 1px solid var(--gray-200); z-index: 1;
    }
    #list-pane input[type="text"] {
      width: 100%; padding: 6px 10px; font-size: 12px;
      border: 1px solid var(--gray-200); border-radius: 4px;
    }
    .cl-row {
      padding: 8px 12px; border-bottom: 1px solid var(--gray-100); cursor: pointer;
    }
    .cl-row:hover { background: var(--gray-50); }
    .cl-row.active { background: #ecfdf5; border-left: 3px solid var(--green-700); padding-left: 9px; }
    .cl-row .name { font-weight: 600; color: var(--gray-700); }
    .cl-row .tier-1 { color: var(--green-700); font-size: 9px; margin-left: 4px; }
    .cl-row .tier-2 { color: var(--indigo-700); font-size: 9px; margin-left: 4px; }
    .cl-row .meta { font-size: 10px; color: var(--gray-500); margin-top: 1px; }
    #detail-pane { padding: 20px 24px; overflow-y: auto; max-height: calc(100vh - 56px); }
    #detail-pane h2 { margin: 0 0 4px; color: var(--green-800); font-size: 18px; }
    #detail-pane .id { color: var(--gray-500); font-size: 11px; margin-bottom: 14px; }
    .field { display: grid; grid-template-columns: 200px 1fr; gap: 8px; padding: 2px 0; }
    .field .k { color: var(--gray-500); font-size: 12px; }
    .field .v { color: var(--gray-700); font-size: 12px; }
    .placeholder { color: var(--gray-400); font-style: italic; padding: 40px 0; text-align: center; }
    .badge {
      display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 10px;
      background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200);
      margin-left: 6px;
    }
    .badge.t1 { background: #f0fdf4; color: var(--green-700); border-color: #bbf7d0; }
    .badge.t2 { background: #eef2ff; color: var(--indigo-700); border-color: #c7d2fe; }
  </style>
</head>
<body>
  <header>
    <h1>MouseCLB</h1>
    <span class="tag">v0.1 — pre-alpha</span>
    <span class="tag" id="count-tag">loading…</span>
  </header>
  <main>
    <aside id="list-pane">
      <div class="search">
        <input type="text" id="search" placeholder="filter by name, lineage, cancer type…" autocomplete="off">
      </div>
      <div id="cl-list"></div>
    </aside>
    <section id="detail-pane">
      <div class="placeholder">Pick a cell line from the list to see its details.</div>
    </section>
  </main>
  <script src="app.js?v=v0_1"></script>
</body>
</html>
